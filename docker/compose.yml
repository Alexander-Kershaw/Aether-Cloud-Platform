name: acp

services:

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: acp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - ../data/minio:/data
    networks:
      - acp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20


  mc:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: acp-mc-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: /bin/sh
    command: >
      -c "
      echo '======|Waiting for MinIO...|=====';
      sleep 2;

      mc alias set aether http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD;

      mc mb --ignore-existing aether/$S3_BUCKET;

      mc cp /etc/hosts aether/$S3_BUCKET/bronze/.keep;
      mc cp /etc/hosts aether/$S3_BUCKET/silver/.keep;
      mc cp /etc/hosts aether/$S3_BUCKET/gold/.keep;

      echo '=====|Lakehouse bucket ready.|====='
      "
    networks:
      - acp-net


networks:
  acp-net:
    name: acp-net