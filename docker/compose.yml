name: acp

services:

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: acp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - ../data/minio:/data
    networks:
      - acp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20


  mc:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: acp-mc-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: /bin/sh
    command: >
      -c "
      echo '======|Waiting for MinIO...|=====';
      sleep 2;

      mc alias set aether http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD;

      mc mb --ignore-existing aether/$S3_BUCKET;

      mc cp /etc/hosts aether/$S3_BUCKET/bronze/.keep;
      mc cp /etc/hosts aether/$S3_BUCKET/silver/.keep;
      mc cp /etc/hosts aether/$S3_BUCKET/gold/.keep;

      echo '=====|Lakehouse bucket ready.|====='
      "
    networks:
      - acp-net

  redpanda:
    image: redpandadata/redpanda:v24.3.6
    container_name: acp-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - redpanda:8082
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "${REDPANDA_KAFKA_HOST_PORT}:9092"
      - "${REDPANDA_ADMIN_HOST_PORT}:9644"
    volumes:
      - ../data/redpanda:/var/lib/redpanda/data
    networks: [acp-net]
    healthcheck:
      test: ["CMD", "bash", "-lc", "rpk cluster info >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: acp-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: "redpanda:9092"
    ports:
      - "${REDPANDA_CONSOLE_HOST_PORT}:8080"
    networks: [acp-net]

  rpk-init:
    image: redpandadata/redpanda:v24.3.6
    container_name: acp-rpk-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "
      echo '=====|Creating baseline topics...|=====';
      rpk topic create aether.events --brokers redpanda:9092 --partitions 1 --replicas 1 || true;
      echo '=====|Topics ready.|=====';
      "
    networks: [acp-net]


networks:
  acp-net:
    name: acp-net