name: acp

services:

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: acp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - ../data/minio:/data
    networks:
      - acp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20


  mc:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: acp-mc-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: /bin/sh
    command: >
      -c "
      echo '======|Waiting for MinIO...|=====';
      sleep 2;

      mc alias set aether http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD;

      mc mb --ignore-existing aether/$S3_BUCKET;

      mc cp /etc/hosts aether/$S3_BUCKET/bronze/.keep;
      mc cp /etc/hosts aether/$S3_BUCKET/silver/.keep;
      mc cp /etc/hosts aether/$S3_BUCKET/gold/.keep;

      echo '=====|Lakehouse bucket ready.|====='
      "
    networks:
      - acp-net

  redpanda:
    image: redpandadata/redpanda:v24.3.6
    container_name: acp-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - redpanda:8082
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "${REDPANDA_KAFKA_HOST_PORT}:9092"
      - "${REDPANDA_ADMIN_HOST_PORT}:9644"
    volumes:
      - ../data/redpanda:/var/lib/redpanda/data
    networks: [acp-net]
    healthcheck:
      test: ["CMD", "bash", "-lc", "rpk cluster info >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: acp-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: "redpanda:9092"
    ports:
      - "${REDPANDA_CONSOLE_HOST_PORT}:8080"
    networks: [acp-net]

  rpk-init:
    image: redpandadata/redpanda:v24.3.6
    container_name: acp-rpk-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "
      echo '=====|Creating baseline topics...|=====';
      rpk topic create aether.events --brokers redpanda:9092 --partitions 1 --replicas 1 || true;
      echo '=====|Topics ready.|=====';
      "
    networks: [acp-net]

  
  spark-master:
    image: apache/spark:3.5.3
    container_name: acp-spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
    ports:
      - "${SPARK_MASTER_UI_HOST_PORT}:8080"
      - "${SPARK_MASTER_RPC_HOST_PORT}:7077"
    volumes:
      - ../config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ../scripts:/opt/aether/scripts:ro
      - ../data:/opt/aether/data:ro
      - ../data/spark/ivy2:/home/spark/.ivy2
    networks: [acp-net]

  spark-worker-1:
    image: apache/spark:3.5.3
    container_name: acp-spark-worker-1
    depends_on:
      - spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
    ports:
      - "${SPARK_WORKER_UI_HOST_PORT}:8081"
    volumes:
      - ../config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ../data:/opt/aether/data:ro
    networks: [acp-net]
    

  trino:
    image: trinodb/trino:468
    container_name: acp-trino
    ports:
      - "8080:8080"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ../config/trino/etc:/etc/trino
      - ../config/hadoop:/etc/trino/hadoop:ro
    networks:
      - acp-net
    depends_on:
      - minio
      - hive-metastore

  metastore-db:
    image: postgres:16
    container_name: acp-metastore-db
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: metastore
    volumes:
      - ../data/metastore-db:/var/lib/postgresql/data
    networks: [acp-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 5s
      timeout: 3s
      retries: 20

  hive-metastore:
    image: apache/hive:4.0.0
    container_name: acp-hive-metastore
    depends_on:
      metastore-db:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      
      HADOOP_CONF_DIR: /etc/hadoop

      SERVICE_OPTS: >
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore-db:5432/metastore
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive

      HIVE_AUX_JARS_PATH: /opt/hive/auxlib
    volumes:
      - ../config/hadoop:/etc/hadoop:ro
      - ../config/hive/lib:/opt/hive/auxlib:ro
    ports:
      - "9083:9083"
    networks: [acp-net]


networks:
  acp-net:
    name: acp-net